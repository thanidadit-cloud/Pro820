<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสินค้า - Thanida</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

</head>

<body>
    <div class="container">
        <main id="main-app">
            <header class="main-header">
                <h1 onclick="showSection('section-dashboard')" style="cursor:pointer">ระบบจัดการสต็อกสินค้า</h1>
                <div id="welcome-banner">
                    <span>สถานะ: </span>
                    <span id="displayUserName">ผู้ดูแลระบบ</span>
                    <button onclick="location.reload()" class="btn-logout">รีเฟรชหน้าจอ</button>
                </div>
            </header>

            <nav class="top-navbar">
                <ul>
                    <li onclick="showSection('section-dashboard')">หน้าหลัก</li>
                    <li onclick="showSection('section-list')">รายการสินค้า</li>
                    <li onclick="showSection('section-update')">นำเข้า/จ่ายออก</li>
                    <li onclick="showSection('section-low')">สินค้าใกล้หมด</li>
                </ul>
            </nav>

            <div class="content-body">
                <div id="section-dashboard" class="section-content">
                    <div class="dashboard-grid">
                        <div class="dash-card" onclick="showSection('section-list')">
                            <h3>รายการสินค้า</h3>
                            <p>ดูสต็อกทั้งหมดในคลัง</p>
                        </div>
                        <div class="dash-card" onclick="showSection('section-update')">
                            <h3>จัดการสต็อก</h3>
                            <p>บันทึกการนำเข้า/เบิกจ่าย</p>
                        </div>
                    </div>
                </div>

                <div id="section-list" class="card section-content">
                    <div class="header-flex" style="display:flex; justify-content:space-between; align-items:center;">
                        <h2>สต็อกสินค้าทั้งหมด</h2>
                        <button class="btn btn-blue" onclick="showSection('section-add')">+ เพิ่มสินค้าใหม่</button>
                    </div>
                    <div id="allProductsDisplay"></div>
                </div>

                <div id="section-add" class="card section-content">
                    <h2>เพิ่มสินค้าใหม่เข้าสู่ระบบ</h2>
                    <div class="form-container">
                        <label>ชื่อสินค้า</label>
                        <input type="text" id="newName" placeholder="ระบุชื่อสินค้า">
                        <label>จำนวนเริ่มต้น</label>
                        <input type="number" id="newQty" placeholder="ระบุจำนวน">
                        <button class="btn btn-blue" onclick="addProduct()">บันทึกข้อมูล</button>
                        <button class="btn-back" onclick="showSection('section-list')">ยกเลิก</button>
                    </div>
                </div>

                <div id="section-update" class="card section-content">
                    <h2>บันทึกความเคลื่อนไหวสต็อก</h2>
                    <div class="form-container">
                        <label>ID สินค้า</label>
                        <input type="number" id="logId" placeholder="ระบุ ID สินค้า">
                        <label>ประเภทรายการ</label>
                        <select id="logType">
                            <option value="IN">นำเข้า (Stock In)</option>
                            <option value="OUT">จ่ายออก (Stock Out)</option>
                        </select>
                        <label>จำนวน</label>
                        <input type="number" id="logAmount" placeholder="ระบุจำนวน">
                        <button class="btn btn-green" onclick="updateStock()">บันทึกรายการ</button>
                    </div>
                </div>

                <div id="section-low" class="card section-content">
                    <h2>แจ้งเตือน: สินค้าใกล้หมด</h2>
                    <div id="lowStockDisplay"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="Js/ui.js"></script>
    <script src="Js/product.js"></script>
</body>

</html>
